<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Car Park TMT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand-block">
        <button type="button" class="brand brand-btn" id="btn-home" title="กลับหน้าแรก">Car Park TMT</button>
        <p class="brand-sub">Dashboard ลานจอดรถ · Google Sheets Realtime</p>
      </div>
      <div class="status-block">
        <span id="live-dot" class="live-dot" title="สถานะการเชื่อมต่อ"></span>
        <div class="status-text">
          <span id="live-label">กำลังเชื่อมต่อ…</span>
          <span id="updated-at">—</span>
        </div>
        <button type="button" id="btn-reload" class="btn ghost">รีเฟรช</button>
      </div>
    </header>

    <main class="shell">
      <div class="nav-row" id="nav-row">
        <button type="button" id="btn-back" class="btn back-btn hidden" aria-label="ย้อนกลับ">
          ← ย้อนกลับ
        </button>
        <nav class="crumbs" id="crumbs" aria-label="เส้นทางเมนู"></nav>
      </div>

      <section class="hero-stats" id="hero-stats">
        <div class="stat">
          <span class="stat-label">แหล่งข้อมูล</span>
          <a
            id="stat-file"
            class="stat-link"
            href="https://docs.google.com/spreadsheets/d/15zM5OZ4rYllNKP7NL3PpFkvGkOMJJj8Jnxutkim1bEs/edit?usp=sharing"
            target="_blank"
            rel="noopener noreferrer"
            >ไฟล์ข้อมูล</a
          >
        </div>
      </section>

      <section class="panel" id="panel">
        <div class="panel-head">
          <h1 id="panel-title">เลือกหัวข้อ</h1>
          <p id="panel-desc">เลือกประเภทรถ หรือลานจอด เพื่อดูสรุปข้อมูลแบบเรียลไทม์</p>
        </div>
        <div class="btn-grid" id="btn-grid"></div>
        <div id="summary" class="summary hidden"></div>
      </section>
    </main>

    <footer class="footer">
      <span>อ่านจาก Google Sheets ชีต <code>DATA</code> — โพลอัตโนมัติทุกไม่กี่วินาที</span>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
